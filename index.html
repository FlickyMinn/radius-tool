<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Overlay Commute Mapper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #f8fafc; color: #0f172a; }
        .app-container { display: flex; flex-direction: column; height: 100%; }
        .control-panel { background: white; padding: 16px; z-index: 1000; border-bottom: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h1 { font-size: 1.1rem; margin-bottom: 12px; font-weight: 700; }
        .form-group { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .input-wrapper { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.8rem; font-weight: 600; color: #64748b; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        
        button { background: #2563eb; color: white; font-weight: 600; border: none; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        
        .btn-measure { background: #db2777; margin-top: 4px; }
        .btn-measure:hover { background: #be185d; }
        .btn-measure.active { background: #9d174d; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); border: 2px solid #fff; }
        
        .btn-clear { background: #64748b; margin-top: 4px; }
        .btn-clear:hover { background: #475569; }
        #map { flex: 1; width: 100%; }
        
        .map-legend { background: white; padding: 12px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); line-height: 1.6; font-size: 0.85rem; max-width: 240px; }
        .legend-title { font-weight: 700; margin-bottom: 6px; border-bottom: 1px solid #e2e8f0; padding-bottom: 2px; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .color-box { width: 24px; height: 14px; border-radius: 3px; border: 2px solid; opacity: 0.7; }
        
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .control-panel { width: 320px; height: 100%; border-bottom: none; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 12px; }
            .form-group { flex-direction: column; align-items: stretch; gap: 12px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="control-panel">
            <h1>Boundary Mapper</h1>
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="location">Starting Point</label>
                    <input type="text" id="location" placeholder="e.g., McDowall, QLD" value="-27.4701, 153.0213">
                </div>
                
                <div class="input-wrapper">
                    <label for="mode-select">Calculation Mode</label>
                    <select id="mode-select">
                        <option value="distance">Distance Radius (km)</option>
                        <option value="time-clear">Drive Time (Clear Run)</option>
                        <option value="time-traffic">Drive Time (Heavy Traffic)</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label for="target-val">Value (km or minutes)</label>
                    <input type="number" id="target-val" value="5" min="1">
                </div>

                <button onclick="handleGenerateButton()">Generate Layer</button>
                <button id="measure-btn" class="btn-measure" onclick="toggleRulerTool()">Turn On Distance Ruler</button>
                <button class="btn-clear" onclick="clearAllLayers()">Clear All Layers</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // STEP 1: PUSH YOUR ACTUAL TOKEN PRECISELY BETWEEN THESE QUOTES
        const apiKey = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjhhNmEwODBlYTcwNTRkMWM5MDk4ZmJiNjg2MDFkZjgxIiwiaCI6Im11cm11cjY0In0='; 

        const map = L.map('map').setView([-27.4701, 153.0213], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let layerGroup = L.layerGroup().addTo(map);
        let centerMarker = null;
        let legendControl = null;
        
        // Custom measurement engine state tracking
        let isRulerActive = false;
        let measurePoints = [];
        let measureLine = null;
        let measureMarkers = [];

        let currentLat = -27.4701;
        let currentLng = 153.0213;

        const colors = [
            { stroke: '#2563eb', fill: '#3b82f6' }, 
            { stroke: '#dc2626', fill: '#f87171' }, 
            { stroke: '#ea580c', fill: '#fb923c' }, 
            { stroke: '#16a34a', fill: '#4ade80' }, 
            { stroke: '#9333ea', fill: '#c084fc' }  
        ];
        let colorIndex = 0;
        let activeLayersData = [];

        function toggleRulerTool() {
            const btn = document.getElementById('measure-btn');
            isRulerActive = !isRulerActive;

            if (isRulerActive) {
                btn.innerText = "Ruler Active: Click 2 Points";
                btn.classList.add('active');
                clearMeasurementDrawing();
            } else {
                btn.innerText = "Turn On Distance Ruler";
                btn.classList.remove('active');
                clearMeasurementDrawing();
            }
        }

        function clearMeasurementDrawing() {
            measurePoints = [];
            if (measureLine) { map.removeLayer(measureLine); measureLine = null; }
            measureMarkers.forEach(m => map.removeLayer(m));
            measureMarkers = [];
        }

        function updateLegendUI() {
            if (legendControl) map.removeControl(legendControl);
            if (activeLayersData.length === 0) return;

            legendControl = L.control({ position: 'bottomright' });
            legendControl.onAdd = function () {
                const div = L.DomUtil.create('div', 'map-legend');
                div.innerHTML = `<div class="legend-title">Active Overlays</div>`;
                activeLayersData.forEach(item => {
                    div.innerHTML += `
                        <div class="legend-item">
                            <div class="color-box" style="background:${item.style.fill}; border-color:${item.style.stroke};"></div>
                            <span>${item.label}</span>
                        </div>`;
                });
                return div;
            };
            legendControl.addTo(map);
        }

        function clearAllLayers() {
            layerGroup.clearLayers();
            if (centerMarker) map.removeLayer(centerMarker);
            centerMarker = null;
            colorIndex = 0;
            activeLayersData = [];
            if (legendControl) map.removeControl(legendControl);
            clearMeasurementDrawing();
            if (isRulerActive) toggleRulerTool();
        }

        async function handleGenerateButton() {
            const locationInput = document.getElementById('location').value.trim();
            const coordRegex = /^[-+]?([1-8]?\d(\.\d+)?|90(\.0+)?),\s*[-+]?(180(\.0+)?|((1[0-7]\d)|([1-9]?\d))(\.\d+)?)$/;
            
            if (coordRegex.test(locationInput)) {
                const parts = locationInput.split(',');
                currentLat = parseFloat(parts[0]);
                currentLng = parseFloat(parts[1]);
                runDrawingEngine(currentLat, currentLng);
            } else {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationInput)}`);
                    const data = await response.json();
                    if (!data || data.length === 0) return alert("Location not found.");

                    currentLat = parseFloat(data[0].lat);
                    currentLng = parseFloat(data[0].lon);
                    
                    document.getElementById('location').value = `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
                    runDrawingEngine(currentLat, currentLng);
                } catch (err) {
                    alert("Address lookup failed.");
                }
            }
        }

        function runDrawingEngine(lat, lon) {
            if (!centerMarker) {
                centerMarker = L.marker([lat, lon]).addTo(map);
            } else {
                centerMarker.setLatLng([lat, lon]);
            }

            const inputVal = parseFloat(document.getElementById('target-val').value);
            const selectedMode = document.getElementById('mode-select').value;
            const modeText = document.getElementById('mode-select').options[document.getElementById('mode-select').selectedIndex].text;
            
            const currentStyle = colors[colorIndex % colors.length];
            colorIndex++;

            const layerLabel = `${inputVal}${selectedMode === 'distance' ? 'km' : ' min'} (${modeText.split('(')[0].trim()})`;

            if (selectedMode === 'distance') {
                const newCircle = L.circle([lat, lon], {
                    color: currentStyle.stroke,
                    fillColor: currentStyle.fill,
                    fillOpacity: 0.15,
                    radius: inputVal * 1000
                }).addTo(layerGroup);
                
                activeLayersData.push({ label: layerLabel, style: currentStyle });
                updateLegendUI();
                
                const allLayers = layerGroup.getLayers().concat(centerMarker);
                map.fitBounds(L.featureGroup(allLayers).getBounds());
            } else {
                let minutes = inputVal;
                if (selectedMode === 'time-traffic') {
                    minutes = inputVal * 0.65;
                }
                fetchDrivePerimeter(lat, lon, minutes, currentStyle, layerLabel);
            }
        }

        async function fetchDrivePerimeter(lat, lon, minutes, style, label) {
            const seconds = Math.round(minutes * 60);
            const url = `https://api.openrouteservice.org/v2/isochrones/driving-car`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': apiKey },
                    body: JSON.stringify({
                        locations: [[parseFloat(lon), parseFloat(lat)]],
                        range: [seconds],
                        range_type: 'time'
                    })
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);

                const geojsonData = await response.json();
                
                L.geoJSON(geojsonData, {
                    style: { color: style.stroke, fillColor: style.fill, fillOpacity: 0.15, weight: 3 }
                }).addTo(layerGroup);

                activeLayersData.push({ label: label, style: style });
                updateLegendUI();
                
                const allLayers = layerGroup.getLayers().concat(centerMarker);
                map.fitBounds(L.featureGroup(allLayers).getBounds());
            } catch (err) {
                alert("Drive perimeter calculation failed.");
            }
        }

        // Map Interactions Router
        map.on('click', function(e) {
            if (isRulerActive) {
                // RUN NATIVE MEASUREMENT ENGINE
                measurePoints.push(e.latlng);
                
                const dot = L.circleMarker(e.latlng, { radius: 5, color: '#db2777', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
                measureMarkers.push(dot);

                if (measurePoints.length === 1) {
                    dot.bindPopup("Start point selected.").openPopup();
                } else if (measurePoints.length === 2) {
                    // Compute pure point-to-point geometric distance in meters
                    const distanceMeters = measurePoints[0].distanceTo(measurePoints[1]);
                    const distanceKm = (distanceMeters / 1000).toFixed(2);

                    measureLine = L.polyline(measurePoints, { color: '#db2777', weight: 4, dashArray: '6, 6' }).addTo(map);
                    
                    dot.bindPopup(`<strong>Distance:</strong> ${distanceKm} km`).openPopup();
                    
                    // Reset tool cleanly after displaying computation
                    toggleRulerTool();
                }
            } else {
                // NORMAL MODE: Update text coordinates box cleanly
                currentLat = e.latlng.lat;
                currentLng = e.latlng.lng;
                document.getElementById('location').value = `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
            }
        });
    </script>
</body>
</html>
