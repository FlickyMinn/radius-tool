<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Boundary Overlay</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #f8fafc; color: #0f172a; }
        .app-container { display: flex; flex-direction: column; height: 100%; }
        .control-panel { background: white; padding: 16px; z-index: 1000; border-bottom: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h1 { font-size: 1.1rem; margin-bottom: 12px; font-weight: 700; }
        .form-group { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .input-wrapper { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.8rem; font-weight: 600; color: #64748b; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        button { background: #2563eb; color: white; font-weight: 600; border: none; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        #map { flex: 1; width: 100%; }
        
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .control-panel { width: 320px; height: 100%; border-bottom: none; border-right: 1px solid #e2e8f0; }
            .form-group { flex-direction: column; align-items: stretch; gap: 12px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="control-panel">
            <h1>Boundary Mapper</h1>
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="location">Starting Point</label>
                    <input type="text" id="location" placeholder="e.g., McDowall, QLD" value="McDowall, QLD">
                </div>
                
                <div class="input-wrapper">
                    <label for="mode-select">Calculation Mode</label>
                    <select id="mode-select">
                        <option value="distance">Distance Radius (km)</option>
                        <option value="time-clear">Drive Time (Clear Run)</option>
                        <option value="time-traffic">Drive Time (Heavy Traffic)</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label for="target-val">Value (km or minutes)</label>
                    <input type="number" id="target-val" value="5" min="1">
                </div>

                <button onclick="calculateBoundary()">Generate Layer</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // STEP 1: PUSH YOUR ACTUAL TOKEN PRECISELY BETWEEN THESE QUOTES
        const apiKey = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjhhNmEwODBlYTcwNTRkMWM5MDk4ZmJiNjg2MDFkZjgxIiwiaCI6Im11cm11cjY0In0='; 

        // Initialise the map view
        const map = L.map('map').setView([-27.4701, 153.0213], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let currentLayer = null;
        let centerMarker = null;

        async function calculateBoundary() {
            const locationQuery = document.getElementById('location').value;
            if (!locationQuery) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationQuery)}`);
                const data = await response.json();
                if (!data || data.length === 0) return alert("Location not found.");

                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                
                runDrawingEngine(lat, lon);
            } catch (err) {
                alert("Geocoding lookup failed.");
            }
        }

        function runDrawingEngine(lat, lon) {
            // Clean out old elements dynamically
            if (currentLayer) map.removeLayer(currentLayer);
            if (centerMarker) map.removeLayer(centerMarker);

            centerMarker = L.marker([lat, lon]).addTo(map);

            const inputVal = parseFloat(document.getElementById('target-val').value);
            const selectedMode = document.getElementById('mode-select').value;

            if (selectedMode === 'distance') {
                // Direct Geometric Drawing Mode
                currentLayer = L.circle([lat, lon], {
                    color: '#2563eb',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.25,
                    radius: inputVal * 1000
                }).addTo(map);
                
                map.fitBounds(currentLayer.getBounds());
            } else {
                // Isochrone Routing Mode
                let minutes = inputVal;
                let stroke = '#dc2626';
                let fill = '#f87171';

                if (selectedMode === 'time-traffic') {
                    minutes = inputVal * 0.65; // Apply traffic reduction directly
                    stroke = '#ea580c';
                    fill = '#fb923c';
                }

                fetchDrivePerimeter(lat, lon, minutes, stroke, fill);
            }
        }

        async function fetchDrivePerimeter(lat, lon, minutes, strokeColor, fillColor) {
            const seconds = Math.round(minutes * 60);
            const url = `https://api.openrouteservice.org/v2/isochrones/driving-car`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': apiKey },
                    body: JSON.stringify({
                        locations: [[parseFloat(lon), parseFloat(lat)]],
                        range: [seconds],
                        range_type: 'time'
                    })
                });

                if (!response.ok) {
                    const errData = await response.text();
                    throw new Error(`API rejected request: ${response.status} - ${errData}`);
                }

                const geojsonData = await response.json();
                
                currentLayer = L.geoJSON(geojsonData, {
                    style: { color: strokeColor, fillColor: fillColor, fillOpacity: 0.3, weight: 3 }
                }).addTo(map);

                map.fitBounds(currentLayer.getBounds());
            } catch (err) {
                console.error(err);
                alert("Map Render Failed. Trace details: " + err.message);
            }
        }

        // Tap interface connector
        map.on('click', function(e) {
            document.getElementById('location').value = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
            runDrawingEngine(e.latlng.lat, e.latlng.lng);
        });

        // Trigger default map display on load automatically
        runDrawingEngine(-27.4701, 153.0213);
    </script>
</body>
</html>
