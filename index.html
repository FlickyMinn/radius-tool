<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Overlay Commute Mapper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #f8fafc; color: #0f172a; }
        .app-container { display: flex; flex-direction: column; height: 100%; }
        .control-panel { background: white; padding: 16px; z-index: 1000; border-bottom: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h1 { font-size: 1.1rem; margin-bottom: 12px; font-weight: 700; }
        .form-group { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .input-wrapper { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.8rem; font-weight: 600; color: #64748b; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        button { background: #2563eb; color: white; font-weight: 600; border: none; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .btn-clear { background: #64748b; margin-top: 4px; }
        .btn-clear:hover { background: #475569; }
        #map { flex: 1; width: 100%; }
        
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .control-panel { width: 320px; height: 100%; border-bottom: none; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 12px; }
            .form-group { flex-direction: column; align-items: stretch; gap: 12px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="control-panel">
            <h1>Boundary Mapper</h1>
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="location">Starting Point</label>
                    <input type="text" id="location" placeholder="e.g., McDowall, QLD" value="McDowall, QLD">
                </div>
                
                <div class="input-wrapper">
                    <label for="mode-select">Calculation Mode</label>
                    <select id="mode-select">
                        <option value="distance">Distance Radius (km)</option>
                        <option value="time-clear">Drive Time (Clear Run)</option>
                        <option value="time-traffic">Drive Time (Heavy Traffic)</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label for="target-val">Value (km or minutes)</label>
                    <input type="number" id="target-val" value="30" min="1">
                </div>

                <button onclick="handleGenerateButton()">Generate Layer</button>
                <button class="btn-clear" onclick="clearAllLayers()">Clear All Layers</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // STEP 1: PUSH YOUR ACTUAL TOKEN PRECISELY BETWEEN THESE QUOTES
        const apiKey = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjhhNmEwODBlYTcwNTRkMWM5MDk4ZmJiNjg2MDFkZjgxIiwiaCI6Im11cm11cjY0In0='; 

        const map = L.map('map').setView([-27.4701, 153.0213], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let layerGroup = L.layerGroup().addTo(map);
        let centerMarker = null;

        // Global variables to remember the active location reliably
        let currentLat = -27.4701;
        let currentLng = 153.0213;
        let lastSearchedText = "McDowall, QLD";

        const colors = [
            { stroke: '#2563eb', fill: '#3b82f6' }, // Blue
            { stroke: '#dc2626', fill: '#f87171' }, // Red
            { stroke: '#ea580c', fill: '#fb923c' }, // Orange
            { stroke: '#16a34a', fill: '#4ade80' }, // Green
            { stroke: '#9333ea', fill: '#c084fc' }  // Purple
        ];
        let colorIndex = 0;

        function clearAllLayers() {
            layerGroup.clearLayers();
            if (centerMarker) map.removeLayer(centerMarker);
            centerMarker = null;
            colorIndex = 0;
        }

        // Triggered by the main action button
        async function handleGenerateButton() {
            const locationInput = document.getElementById('location').value.trim();
            
            // If the user hasn't changed the text box address, use the coordinates we already have stored
            if (locationInput === lastSearchedText || locationInput.includes(',')) {
                runDrawingEngine(currentLat, currentLng);
            } else {
                // Otherwise, perform a fresh address search lookup
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationInput)}`);
                    const data = await response.json();
                    if (!data || data.length === 0) return alert("Location not found.");

                    currentLat = parseFloat(data[0].lat);
                    currentLng = parseFloat(data[0].lon);
                    lastSearchedText = locationInput;
                    
                    runDrawingEngine(currentLat, currentLng);
                } catch (err) {
                    alert("Address lookup failed.");
                }
            }
        }

        function runDrawingEngine(lat, lon) {
            if (!centerMarker) {
                centerMarker = L.marker([lat, lon]).addTo(map);
            } else {
                centerMarker.setLatLng([lat, lon]);
            }

            const inputVal = parseFloat(document.getElementById('target-val').value);
            const selectedMode = document.getElementById('mode-select').value;
            
            const currentStyle = colors[colorIndex % colors.length];
            colorIndex++;

            if (selectedMode === 'distance') {
                const newCircle = L.circle([lat, lon], {
                    color: currentStyle.stroke,
                    fillColor: currentStyle.fill,
                    fillOpacity: 0.2,
                    radius: inputVal * 1000
                }).addTo(layerGroup);
                
                map.fitBounds(newCircle.getBounds());
            } else {
                let minutes = inputVal;
                if (selectedMode === 'time-traffic') {
                    minutes = inputVal * 0.65;
                }
                fetchDrivePerimeter(lat, lon, minutes, currentStyle.stroke, currentStyle.fill);
            }
        }

        async function fetchDrivePerimeter(lat, lon, minutes, strokeColor, fillColor) {
            const seconds = Math.round(minutes * 60);
            const url = `https://api.openrouteservice.org/v2/isochrones/driving-car`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': apiKey },
                    body: JSON.stringify({
                        locations: [[parseFloat(lon), parseFloat(lat)]],
                        range: [seconds],
                        range_type: 'time'
                    })
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);

                const geojsonData = await response.json();
                
                const newPoly = L.geoJSON(geojsonData, {
                    style: { color: strokeColor, fillColor: fillColor, fillOpacity: 0.2, weight: 3 }
                }).addTo(layerGroup);

                map.fitBounds(newPoly.getBounds());
            } catch (err) {
                alert("Drive perimeter calculation failed.");
            }
        }

        // Map Click Action
        map.on('click', function(e) {
            currentLat = e.latlng.lat;
            currentLng = e.latlng.lng;
            
            // Format coordinates nicely in the text box
            const displayCoords = `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
            document.getElementById('location').value = displayCoords;
            lastSearchedText = displayCoords;
            
            runDrawingEngine(currentLat, currentLng);
        });
    </script>
</body>
</html>
